<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALFARUK Support — Staff Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <div class="panel">
      <h1>Staff Portal — Demo</h1>
      <p class="soft">This is a static staff portal UI. To make it functional, configure the <code>/api/admin/tickets</code> and <code>/api/admin/reply</code> endpoints to point to your backend.</p>
      <div style="height:12px"></div>
      <label>Admin token (paste)</label>
      <input id="token" class="input" placeholder="Admin token" />
      <div style="height:8px"></div>
      <label>Filter</label>
      <select id="filter" class="input"><option value="all">All</option><option value="technical">Technical</option><option value="general">General</option><option value="feedback">Feedback</option></select>
      <div style="height:12px"></div>
      <button class="btn" id="load">Load tickets (demo)</button>
      <div id="tickets" style="margin-top:12px"></div>
      <div style="height:12px"></div>
      <h3>Reply (demo)</h3>
      <input id="ticketId" class="input" placeholder="Ticket ID" />
      <div style="height:8px"></div>
      <textarea id="replyText" class="input" rows="4" placeholder="Reply message"></textarea>
      <div style="height:8px"></div>
      <button class="btn" id="replyBtn">Send reply (demo)</button>
      <div id="result" class="soft" style="margin-top:12px"></div>
    </div>
  </main>
  <script>
    // Backend configuration: supply ?backend=https://your-backend.example (or replace default)
    const BACKEND = (new URLSearchParams(window.location.search).get('backend')) || 'https://YOUR_BACKEND_URL';
    const apiBase = BACKEND.replace(/\/$/, '');

    async function loadTickets() {
      const out = document.getElementById('tickets'); out.innerHTML='Loading...';
      const cat = document.getElementById('filter').value;
      const token = document.getElementById('token').value;
      try {
        const res = await fetch(`${apiBase}/api/admin/tickets?token=${encodeURIComponent(token)}&category=${encodeURIComponent(cat)}`);
        const data = await res.json();
        out.innerHTML = '';
        (data.tickets || []).forEach(t => {
          const d = document.createElement('div'); d.className='item'; d.innerHTML=`<b>#${t.id}</b> • ${t.category} • ${t.status}<div class='soft'>${t.created_at}</div><div style='margin-top:6px'>${t.message}</div>`;
          d.onclick = ()=> document.getElementById('ticketId').value = t.id;
          out.appendChild(d);
        });
      } catch (err) {
        out.innerHTML = 'Failed to load tickets — check backend URL and token. ' + err;
      }
    }

    document.getElementById('load').addEventListener('click', loadTickets);

    document.getElementById('replyBtn').addEventListener('click', async ()=>{
      const id = parseInt(document.getElementById('ticketId').value, 10); const text = document.getElementById('replyText').value.trim();
      const token = document.getElementById('token').value;
      if(!id||!text){ document.getElementById('result').innerText='Provide ticket id and reply text'; return }
      try {
        const res = await fetch(`${apiBase}/api/admin/reply`, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ token, ticket_id: id, text }) });
        const data = await res.json();
        document.getElementById('result').innerText = data.message || data.detail || 'Done';
        loadTickets();
      } catch (err) {
        document.getElementById('result').innerText = 'Failed to send reply — check backend URL and CORS. ' + err;
      }
    })

    // initial load
    document.addEventListener('DOMContentLoaded', ()=>{
      // if token is provided in query param, prefill it
      const qToken = new URLSearchParams(window.location.search).get('token');
      if(qToken) document.getElementById('token').value = qToken;
      loadTickets();
    });
  </script>
</body>
</html>
